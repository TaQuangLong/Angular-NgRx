<div class="wizard-container">
  <div class="wizard-header">
    <div class="step done">1</div>
    <div class="step-line done"></div>
    <div class="step active">2</div>
    <div class="step-line"></div>
    <div class="step">3</div>
  </div>

  <h2>Contact Details</h2>

  <form [formGroup]="form" (ngSubmit)="next()">
    <div class="form-group">
      <label for="email">Email Address *</label>
      <input id="email" type="email" formControlName="email" placeholder="Enter email address" />
      <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        A valid email address is required.
      </span>
    </div>

    <div class="form-group">
      <label for="phone">Phone Number *</label>
      <input id="phone" type="tel" formControlName="phoneNumber" placeholder="e.g. +1 555 000 1234" />
      <span class="error" *ngIf="form.get('phoneNumber')?.invalid && form.get('phoneNumber')?.touched">
        A valid phone number is required.
      </span>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="back()">&larr; Back</button>
      <button type="submit" class="btn-primary">Next &rarr;</button>
    </div>
  </form>
</div>
